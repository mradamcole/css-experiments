<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Energy Orb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" aria-label="Energy orb cursor experience">
    <canvas id="energy-canvas" aria-hidden="true"></canvas>

    <section class="hero-copy">
      <p class="eyebrow">Interactive Canvas Study</p>
      <h1>Electric energy orb.</h1>
      <p class="description">
        Sweep your cursor across the screen and pull a glowing plasma orb through
        the dark. Its comet tail fades, flickers, and snaps with charged motion.
      </p>
    </section>
  </main>

  <noscript>This experience needs JavaScript enabled.</noscript>
  <script src="script.js"></script>
</body>
</html>
